---
- name: Administra servidores web
  hosts: webservers

  tasks:
    - name: Instala o apache
      ansible.builtin.package:
        name: apache2
      tags: webservers, webservers_package

    - name: Habilita e inicia o apache
      ansible.builtin.service:
        name: apache2
        enabled: true
        state: started
      tags:
        - webservers
        - webservers_service

    - name: Copia o arquivo de configuração
      ansible.builtin.copy:
        src: files/site.conf
        dest: /etc/apache2/sites-available/site.conf
        owner: www-data
        group: www-data
        mode: '0644'
      notify:
        - Restart apache2
      when: ansible_facts['os_family'] == "Debian"
      tags:
        - webservers
        - webservers_copy

  handlers:
    - name: Restart apache2
      ansible.builtin.service:
        name: apache2
        state: restarted
