---
- name: Testa o módulo fstab
  hosts: lab

  tasks:
    - name: Garante que o caminho para montagem exista
      ansible.builtin.file:
        path: /home/nfs
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Adiciona entrada em /etc/fstab
      fstab:
        spec: '192.168.64.16:/home'
        path: /home/nfs
        type: nfs
        options: 'rsize=8192,wsize=65536,timeo=14,intr'
      register: results

    - name: Imprime as informações do módulo fstab
      ansible.builtin.debug:
        var: results
