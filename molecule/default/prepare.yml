---
- name: Prepare
  hosts: all
  gather_facts: false # Desativa a coleta de fatos antes de ter o sudo/python prontos
  become: false       # Roda diretamente como root do contêiner
  tasks:
    - name: Garantir que o sudo esteja instalado no Debian/Ubuntu
      ansible.builtin.raw: apt-get update && apt-get install -y curl iproute2 python3 sudo
      changed_when: false

