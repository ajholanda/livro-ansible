---
- name: Elimina a requisição de senha
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item }}"
    content: "{{ item }} ALL=(ALL) NOPASSWD:ALL"
    validate: 'visudo -cf %s'
    owner: root
    group: root
    mode: "0440"
  loop: ['aft', 'ajh', 'dcs', 'epb', 'mtm', 'tbc']
  when: ansible_facts['system'] == "Linux"
  tags: sudo
