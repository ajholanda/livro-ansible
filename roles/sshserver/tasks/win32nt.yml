---
- name: Garante a regra de firewall do OpenSSH em hosts Windows
  hosts: windows
  tasks:
    - name: Copia o script de verificação do firewall SSH para o sistema
      ansible.windows.win_copy:
        dest: 'C:\Windows\Ensure-SSHFirewallRule.ps1'
        content: |
          # Verifica se a regra do firewall SSH está presente.
          $rule = Get-NetFirewallRule -Name 'OpenSSH-Server-In-TCP' -ErrorAction SilentlyContinue

          if (-not $rule) {
              Write-Output 'SSH rule missing. Adding it...'
              New-NetFirewallRule -Name 'OpenSSH-Server-In-TCP' -DisplayName 'OpenSSH Server (sshd)' -Enabled True -Direction Inbound -Protocol TCP -Action Allow -LocalPort 22
          } else {
              Write-Output 'SSH firewall rule is already present.'
          }
      tags: sshserver

    - name: Agenda a verificação da regra de firewall SSH na inicialização
      community.windows.win_scheduled_task:
        name: EnsureSSHFirewallRule
        description: Recria a regra de firewall do OpenSSH caso o Windows Update a remova
        actions:
          - path: powershell.exe
            arguments: -ExecutionPolicy Bypass -File C:\Windows\Ensure-SSHFirewallRule.ps1
        triggers:
          - type: boot
        username: SYSTEM
        run_level: highest
        state: present
        enabled: true
      tags: sshserver