---
- name: Cria os usuários administradores
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.passwd }}"
    shell: /bin/bash
    groups: "{{ 'wheel' if ansible_facts['os_family'] == 'RedHat' else 'sudo' }}"
    append: true
  loop: "{{ user_admins }}"
  when: user_admins is defined
  tags: user

- name: Copia a chave pública
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ lookup('file', 'files/%s.pub' | format(item.name)) }}"
  loop: "{{ user_admins }}"
  when: user_admins is defined
  tags: user

- name: Elimina a solicitação de senha pelo sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL"
    validate: 'visudo -cf %s'
    owner: root
    group: root
    mode: "0440"
  loop: "{{ user_admins }}"
  loop_control:
    label: "{{ item.name }}"
  when: user_admins is defined
  tags: user
