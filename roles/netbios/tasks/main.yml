---
- name: Descobre subchaves de interfaces NetBT
  ansible.windows.win_shell: |
    (Get-ChildItem 'HKLM:\SYSTEM\CurrentControlSet\Services\NetBT\Parameters\Interfaces').PSChildName
  register: netbios_interfaces
  changed_when: false
  when: ansible_facts['os_family'] == 'Windows'
  tags: netbios

- name: Desabilita NetBIOS sobre TCP/IP em todas as interfaces
  ansible.windows.win_regedit:
    path: 'HKLM:\SYSTEM\\CurrentControlSet\Services\NetBT\Parameters\Interfaces\{{ item }}'
    name: NetbiosOptions
    data: 2
    type: dword
  loop: "{{ netbios_interfaces.stdout_lines }}"
  when: ansible_facts['os_family'] == 'Windows'
  tags: netbios
