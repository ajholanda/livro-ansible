name: Fluxo de testes

on:
  push:
    paths:
      - '**.yml'
      - '**.yaml'
      - '.github/workflows/**'
      - 'molecule/**'
      - 'roles/**'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixa o código
        uses: actions/checkout@v4

      - name: Configura o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instala Ansible, Molecule, plugin Docker e Testinfra
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<=2.18" "molecule>=24" molecule-plugins[docker] ansible-lint pytest-testinfra
          Para depuração, retire os comentários.
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_VERBOSITY: '3'
          MOLECULE_DEBUG: 'true'

      - name: Executa os testes com o Molecule
        run: molecule test
