---
- name: Erros
  hosts: localhost
  vars:
    myvar: "My Variable"

  tasks:
    # - name: Tarefa
    #   debug: msg="Texto em aberto'

    # - name: Tarefa
    #   debug: msg="{{ myvar }"

    # - name: Tarefa
    # debug: msg="Texto ok"

    # - name: Testa a conectividade
    #   ansible.builtin.pong:

    # - name: Copia o arquivo de inventário
    #   copy:
    #     path: hosts.ini
    #     dest: /etc/ansible/hosts

    - name: Comete erro
      ansible.builtin.command: /bin/false
      tags: err0

    - name: Tenta listar arquivo que não existe
      ansible.builtin.command: ls /tmp/fooo.txt
      tags: err1

    - name: Ignora o erro
      ansible.builtin.command: /bin/false
      ignore_errors: true
      tags: err2

    - name: Não interpreta false como erro
      ansible.builtin.command: /bin/false
      register: status
      failed_when: status.rc != 1
      tags: err3

    - name: Testa se conteúdo de arquivo está acessível
      ansible.builtin.command: cat /etc/ansible/hosts
      # Retire os comentários a seguir para gerar o erro.
      # become: true
      # become_user: vagrant
      register: status
      failed_when:
        - status.rc != 0
        - "'No such file or directory' not in status.stderr"
      environment:
        LANG: C
        LC_ALL: C
      tags: err4

    - name: Testa a conectividade
      ansible.builtin.command: ping -c 1 web.example.net
      register: status
      failed_when: >
        status.rc != 0
        or "100% packet loss" in status.stdout
      tags: err5

- name: Ativa any_errors_fatal
  hosts: lab
  any_errors_fatal: true
  tasks:
    - name: Usa any_errors_fatal
      tags: err6
      block:
        - name: Primeira tarefa
          ansible.builtin.debug:
            msg: "Executa em todos os hosts"

        - name: Segunda tarefa falha somente em lab01
          ansible.builtin.command: /bin/false
          when: inventory_hostname == "lab01.example.net"

        - name: Terceira tarefa
          ansible.builtin.debug:
            msg: "Nunca é executada"

- name: Atualiza o SO aceitando falhas
  hosts: webservers
  max_fail_percentage: 40
  tasks:
    - name: Atualiza o SO (apt full-upgrade)
      ansible.builtin.apt:
        upgrade: full
      tags: err7

    - name: Aviso
      ansible.builtin.debug:
        msg: "Pelo menos 60% dos hosts foram atualizados"
      tags: err7

- name: Executa manipuladores
  hosts: webservers
  force_handlers: true
  tasks:
    - name: Força execução dos manipuladores
      tags: err8
      when: ansible_facts['os_family'] | lower == "debian"
      block:
        - name: Habilita o módulo userdir
          community.general.apache2_module:
            state: present
            name: userdir

        - name: Copia a configuração do módulo userdir
          ansible.builtin.copy:
            src: files/userdir.conf
            dest: /etc/apache2/mods-available/userdir.conf
            owner: root
            group: root
            mode: '0755'
          notify:
            - Restart apache2

        - name: Provoca falha na tarefa 3
          ansible.builtin.command: /bin/false

  handlers:
    - name: Restart apache2
      ansible.builtin.service:
        name: apache2
        state: restarted

- name: Espera com wait_for
  hosts: localhost
  tasks:
    - name: Aguarda porta SSH estar disponível
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 80
        delay: 5
        timeout: 120
        state: started
      tags: err9
