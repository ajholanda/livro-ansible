---
- name: Administra servidores web
  hosts: webservers
  tasks:
    - name: Instala o php
      ansible.builtin.package:
        name: php
      when: >
        webservers_install_php is defined
        and webservers_install_php

    - name: Exibe o conteúdo de hostvars['w3.example.net']['ansible_facts']['default_ipv4']['address']
      ansible.builtin.debug:
        var: hostvars['w3.example.net']['ansible_facts']['default_ipv4']['address']
